name: Fetch Zephyr port deps

runs:
  using: composite
  steps:
    - name: Get Linux build dependencies
      if: runner.os == 'Linux'
      run: |
        sudo dpkg --add-architecture i386
        export PKG_CONFIG_PATH=/usr/lib/i386-linux-gnu/pkgconfig
        sudo apt-get update
        sudo apt-get install -y libusb-1.0-0-dev libudev-dev pkg-config libsdl2-dev:i386 libsdl2-image-dev:i386 mtools
      shell: bash
    - name: Setup Zephyr project
      uses: zephyrproject-rtos/action-zephyr-setup@v1
      with:
        app-path: zephyr-config
        base-path: ports/zephyr-cp
        toolchains: arm-zephyr-eabi
    - name: Export cmake info
      run: west zephyr-export
      shell: bash
      working-directory: ports/zephyr-cp
